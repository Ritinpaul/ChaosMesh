spec_version: 1
name: chaosmesh-arena
type: space
runtime: fastapi
app: server.main:app
port: 8000
version: 0.2.0
entry_point: environment:ChaosMeshArenaEnv

environment:
  class: environment.ChaosMeshArenaEnv
  init_params: {}
  methods:
    reset:
      description: Reset the environment for a selected SRE incident task.
      params:
        task_id:
          type: integer
      returns: observation
    step:
      description: Submit an SRE action and return (observation, reward, done).
      params:
        action:
          type: object
      returns: [observation, reward, done]
    state:
      description: Return current environment state metadata.
      returns: state

api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
    step:
      method: POST
      path: /step
    state:
      method: GET
      path: /state
    tasks:
      method: GET
      path: /tasks
    grader:
      method: POST
      path: /grader

inference:
  script: inference.py
  llm_client: openai
  required_env:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN


tasks:
  - id: sre-pod-crashloop
    task_id: sre-pod-crashloop
    name: pod-crashloop-recovery
    difficulty: easy
    description: A critical pod is in CrashLoopBackOff. Diagnose root cause and restore service.
    max_steps: 8
    reset_params:
      task_id: 0
    grader: graders:grade_task_0
    graders:
      - graders:grade_task_0
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0

  - id: sre-db-timeout
    task_id: sre-db-timeout
    name: cascading-db-timeout
    difficulty: medium
    description: Database timeouts are causing cascading failures. Identify and remediate.
    max_steps: 8
    reset_params:
      task_id: 1
    grader: graders:grade_task_1
    graders:
      - graders:grade_task_1
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0

  - id: sre-high-latency
    task_id: sre-high-latency
    name: service-high-latency
    difficulty: medium
    description: Auth service experiencing high P99 latency. Find the bottleneck and fix it.
    max_steps: 8
    reset_params:
      task_id: 2
    grader: graders:grade_task_1
    graders:
      - graders:grade_task_1
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0

  - id: sre-node-pressure
    task_id: sre-node-pressure
    name: node-memory-pressure
    difficulty: hard
    description: A node is under memory pressure and evicting pods. Stabilize the cluster.
    max_steps: 8
    reset_params:
      task_id: 3
    grader: graders:grade_task_2
    graders:
      - graders:grade_task_2
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0

  - id: sre-security-anomaly
    task_id: sre-security-anomaly
    name: ambiguous-attack-vs-misconfig
    difficulty: hard
    description: Unusual traffic patterns detected. Determine if this is an attack or misconfiguration.
    max_steps: 8
    reset_params:
      task_id: 4
    grader: graders:grade_task_2
    graders:
      - graders:grade_task_2
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0

  - id: sre-compound-chaos
    task_id: sre-compound-chaos
    name: compound-chaos-event
    difficulty: hard
    description: Multiple simultaneous failures - node down, service degraded, pod crashlooping.
    max_steps: 10
    reset_params:
      task_id: 5
    grader: graders:grade_task_2
    graders:
      - graders:grade_task_2
    reward_range:
      - 0.0
      - 1.0
    max_reward: 1.0
